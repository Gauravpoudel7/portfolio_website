{% extends "base.html" %}

{% block content %}
<section class="section">
    <div class="container">
        <div class="section-head reveal" data-reveal="fade-up">
            <span class="eyebrow">Contact</span>
            <h1 class="section-title">Let's <span class="text-gradient">talk</span>.</h1>
            <p class="section-lede">Head to the Contact section on the home page to send a message.</p>
        </div>
        <div class="text-center reveal" data-reveal="fade-up" data-reveal-delay="80">
            <a href="/#contact" class="btn btn-primary btn-lg magnetic">
                <span>Open Contact Form</span>
                <i class="ph ph-arrow-right" aria-hidden="true"></i>
            </a>
        </div>
    </div>
</section>
{% endblock %}
