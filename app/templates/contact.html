{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4">Contact Me</h2>
    <p class="lead mb-4">Have a project in mind or want to collaborate? Feel free to reach out!</p>
    <div class="row">
        <div class="col-md-8">
            <form action="/submit_contact" method="POST">
                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" class="form-control" id="name" name="name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="message" class="form-label">Message</label>
                    <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-lg">Send Message</button>
            </form>
        </div>
        <div class="col-md-4">
            <div class="card bg-dark text-white border-0 p-4">
                <h5>Get in Touch</h5>
                <p><i class="fas fa-envelope me-2"></i> alex@example.com</p>
                <p><i class="fas fa-phone me-2"></i> +1 (555) 123-4567</p>
                <p><i class="fas fa-map-marker-alt me-2"></i> San Francisco, CA</p>
                <hr class="bg-white">
                <h5>Follow Me</h5>
                <div class="d-flex gap-3">
                    <a href="#" class="text-white fs-4"><i class="fab fa-linkedin"></i></a>
                    <a href="#" class="text-white fs-4"><i class="fab fa-github"></i></a>
                    <a href="#" class="text-white fs-4"><i class="fab fa-twitter"></i></a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
